<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Memo List</title>
</head>
<body>
    <h1>메모 목록</h1>

    {% for memo in memos %}
        <div>
            <h2>
                <a href="{% url 'memo:memo_detail' memo.pk %}">
                    {{ memo.title }}
                </a>
            </h2>
            <p>{{ memo.created_at }}</p>
        </div>
        <hr>
    {% empty %}
        <p>아직 작성된 메모가 없습니다.</p>
    {% endfor %}
</body>
</html>
